services:
  backend:
    build:
      context: ./backend
    environment:
      WORKSPACE_PATH: /app/workspace
      DATABASE_URL: sqlite:////app/workspace/database/research_graph.db
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ugraph.me,http://ugraph.me}
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
