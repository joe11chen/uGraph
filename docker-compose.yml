services:
  backend:
    build:
      context: ./backend
    environment:
      WORKSPACE_PATH: /app/workspace
      DATABASE_URL: sqlite:////app/workspace/database/research_graph.db
    volumes:
      - ./workspace:/app/workspace
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
